name: Publish @daraja-mcp/support

# Two paths lead here:
#
# 1. auto-release (on push to master) — when a merge touches knowledge/** or
#    packages/support-mcp/**, auto-bump the prerelease, commit the version, tag,
#    and push. The tag push re-enters this workflow and fires the publish job.
#    Self-trigger loops are guarded by filtering commit messages for
#    "chore(release):".
#
# 2. publish (on tag push or workflow_dispatch) — builds, lints knowledge, runs
#    tests, and publishes to npm under the `beta` dist-tag with SLSA provenance.
#
# Cadence: a knowledge merge reaches @daraja-mcp/support@beta users in roughly
# five minutes, with no maintainer action required beyond CODEOWNER review.

on:
  push:
    branches:
      - master
    tags:
      - 'support-mcp-v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm pack only; do not publish'
        required: false
        type: boolean
        default: false

jobs:
  auto-release:
    # Fires only on push to master (not on tag push). Skips commits authored by
    # the auto-bump itself. Skips pushes that only touched unrelated paths.
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if knowledge or support-mcp changed
        id: changed
        run: |
          base="${{ github.event.before }}"
          head="${{ github.event.after }}"
          if git diff --name-only "$base" "$head" | grep -E '^(knowledge/|packages/support-mcp/)' >/dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changed.outputs.relevant == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changed.outputs.relevant == 'true'
        run: npm ci

      - name: Lint knowledge
        if: steps.changed.outputs.relevant == 'true'
        run: npm run lint:knowledge

      - name: Configure git
        if: steps.changed.outputs.relevant == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Bump prerelease and tag
        if: steps.changed.outputs.relevant == 'true'
        working-directory: packages/support-mcp
        run: |
          new_version=$(npm version prerelease --preid=beta --no-git-tag-version)
          # npm version prints "v<version>"; strip the leading v for the tag.
          clean_version=${new_version#v}
          cd ../..
          git add packages/support-mcp/package.json
          git commit -m "chore(release): support-mcp-v${clean_version}"
          git tag "support-mcp-v${clean_version}"
          git push origin master --follow-tags

  publish:
    # Fires on tag push (either auto-release above or a manual tag) or on
    # workflow_dispatch. The tag-push path is what carries auto-released
    # versions through to npm.
    if: >-
      startsWith(github.ref, 'refs/tags/support-mcp-v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance attestation (SLSA).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint knowledge
        run: npm run lint:knowledge

      - name: Build workspace
        run: npm run build -w @daraja-mcp/support

      - name: Run tests
        run: npx vitest run

      - name: Inspect tarball
        working-directory: packages/support-mcp
        run: npm pack --dry-run

      - name: Publish to npm (beta)
        if: ${{ !inputs.dry-run }}
        working-directory: packages/support-mcp
        run: npm publish --access public --tag beta --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
